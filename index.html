<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SkiVision AI — Анализ лыжной техники</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@400;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   RESET & TOKENS
   ════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --brand: #0AFFD9;
  --brand-dim: rgba(10,255,217,0.13);
  --brand-glow: rgba(10,255,217,0.25);
  --surface: #0A0E18;
  --surface2: #111620;
  --surface3: #182030;
  --surface4: #1E2840;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #F0F2F6;
  --text2: #8090A8;
  --text3: #4A5568;
  --green: #2ECC71;
  --yellow: #F1C40F;
  --red: #E74C3C;
  --green-dim: rgba(46,204,113,0.14);
  --yellow-dim: rgba(241,196,15,0.13);
  --red-dim: rgba(231,76,60,0.14);
  --blue: #378ADD;
  --nav-h: 64px;
  --top-h: 56px;
  --sidebar-w: 220px;
  --radius: 10px;
  --font-h: 'Unbounded', sans-serif;
  --font: 'Manrope', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html { height: 100%; background: var(--surface); }
body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
}

/* ════════════════════════════════════════════════
   SPLASH SCREEN
   ════════════════════════════════════════════════ */
.splash {
  position: fixed; inset: 0;
  background: var(--surface);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}
.splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }

.splash-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 50% 38%, rgba(10,255,217,0.10), transparent 60%);
  pointer-events: none;
}

.splash-mark {
  position: relative;
  width: 76px; height: 76px;
  background: var(--brand-dim);
  border: 1px solid rgba(10,255,217,0.3);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin-bottom: 22px;
  animation: splashPop 0.6s cubic-bezier(.2,.9,.25,1.1) both;
  box-shadow: 0 0 40px rgba(10,255,217,0.18);
}

@keyframes splashPop {
  0% { opacity: 0; transform: scale(0.6) translateY(10px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.splash-title {
  font-family: var(--font-h);
  font-weight: 600;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.2px;
  display: flex; align-items: baseline; gap: 2px;
  animation: splashFade 0.5s ease 0.15s both;
}
.splash-title span { color: var(--brand); }

.splash-sub {
  font-size: 11.5px;
  color: var(--text3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 6px;
  animation: splashFade 0.5s ease 0.25s both;
}

@keyframes splashFade {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

.splash-bar {
  width: 120px; height: 2px;
  background: var(--surface3);
  border-radius: 2px;
  margin-top: 28px;
  overflow: hidden;
  animation: splashFade 0.4s ease 0.3s both;
}
.splash-bar-fill {
  height: 100%; width: 0%;
  background: var(--brand);
  border-radius: 2px;
  animation: splashLoad 1s ease 0.35s forwards;
}
@keyframes splashLoad { to { width: 100%; } }

/* ════════════════════════════════════════════════
   APP SHELL — shared
   ════════════════════════════════════════════════ */
.app {
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.app.ready { opacity: 1; }

.btn-primary { background: var(--brand); color: #000; }
.btn-ghost { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }

input[type=file] { display: none; }

/* ════════════════════════════════════════════════
   DESKTOP LAYOUT (≥ 769px)
   ════════════════════════════════════════════════ */
@media (min-width: 769px) {

  .app { display: flex; }

  /* mobile-only elements hidden on desktop */
  .mobile-only,
  .sidebar-overlay,
  .splash-mobile-hint { display: none !important; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .d-logo {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-h);
    font-size: 13px;
    font-weight: 600;
    color: var(--brand);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .d-logo-icon {
    width: 28px; height: 28px;
    background: var(--brand-dim);
    border: 1px solid rgba(10,255,217,0.3);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .d-nav { padding: 10px 8px; flex: 1; overflow-y: auto; }

  .d-nav-label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text3);
    padding: 8px 8px 4px;
  }

  .d-nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px;
    cursor: pointer; color: var(--text2);
    font-size: 12.5px; font-weight: 500;
    transition: all 0.15s; margin-bottom: 1px;
  }
  .d-nav-item:hover { background: var(--surface3); color: var(--text); }
  .d-nav-item.active { background: var(--brand-dim); color: var(--brand); border: 1px solid rgba(10,255,217,0.2); }
  .d-nav-item i { font-size: 15px; }

  .d-athletes-list { padding: 10px 8px; border-top: 1px solid var(--border); }

  .d-athlete-card {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px; border-radius: 7px;
    cursor: pointer; transition: all 0.15s; margin-bottom: 2px;
  }
  .d-athlete-card:hover { background: var(--surface3); }
  .d-athlete-card.selected { background: var(--surface4); border: 1px solid var(--border2); }

  .d-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .d-athlete-info .name { font-size: 12px; font-weight: 600; color: var(--text); }
  .d-athlete-info .meta { font-size: 10px; color: var(--text3); }

  /* ─── Main ─── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  .d-topbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .d-topbar-left { display: flex; align-items: center; gap: 12px; }

  .d-page-title {
    font-family: var(--font-h); font-size: 12px; font-weight: 600;
    color: var(--text); letter-spacing: -0.2px;
  }

  .d-breadcrumb { color: var(--text3); font-size: 11px; }
  .d-topbar-actions { display: flex; align-items: center; gap: 8px; }

  .d-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 7px;
    font-size: 12px; font-weight: 600; font-family: var(--font);
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .d-btn.btn-primary:hover { opacity: 0.9; }
  .d-btn.btn-ghost:hover { background: var(--surface4); color: var(--text); }

  /* ─── Tabs ─── */
  .d-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    padding: 0 20px; flex-shrink: 0;
  }

  .d-tab {
    padding: 11px 16px; font-size: 12px; font-weight: 600;
    color: var(--text3); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .d-tab:hover { color: var(--text2); }
  .d-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

  .d-badge-count {
    background: var(--red-dim); color: var(--red);
    border-radius: 4px; padding: 1px 5px;
    font-size: 9px; font-weight: 700;
  }

  /* ─── Content ─── */
  .d-content { flex: 1; overflow-y: auto; padding: 18px 20px; }
  .d-content::-webkit-scrollbar { width: 4px; }
  .d-content::-webkit-scrollbar-track { background: transparent; }
  .d-content::-webkit-scrollbar-thumb { background: var(--surface4); border-radius: 2px; }

  .d-tab-panel { display: none; }
  .d-tab-panel.active { display: block; }

  /* ─── Upload ─── */
  .d-upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }

  .d-upload-zone {
    border: 1.5px dashed var(--border2); border-radius: 10px;
    padding: 28px 20px; text-align: center; cursor: pointer;
    transition: all 0.2s; background: var(--surface2);
    display: block;
  }
  .d-upload-zone:hover { border-color: var(--brand); background: var(--brand-dim); }
  .d-upload-zone.has-file { border-color: var(--green); border-style: solid; background: var(--green-dim); }

  .d-upload-icon { font-size: 28px; color: var(--text3); margin-bottom: 8px; }
  .d-upload-zone.has-file .d-upload-icon { color: var(--green); }
  .d-upload-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .d-upload-sub { font-size: 11px; color: var(--text3); }

  /* ─── Form ─── */
  .d-anthropo-section {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 14px;
  }

  .d-section-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 14px;
  }

  .d-form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .d-field-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 10.5px; font-weight: 600; color: var(--text3);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .d-field-input {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 7px; padding: 8px 11px; color: var(--text);
    font-family: var(--font-mono); font-size: 13px; width: 100%;
    font-weight: 500; transition: border-color 0.15s;
  }
  .d-field-input:focus { outline: none; border-color: var(--brand); }
  .d-field-unit { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* ─── Analysis progress ─── */
  .d-analysis-progress {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 14px;
  }
  .d-progress-steps { display: flex; flex-direction: column; gap: 10px; }

  .d-step-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 7px;
  }
  .d-step-row.done { background: var(--green-dim); }
  .d-step-row.running { background: var(--brand-dim); border: 1px solid rgba(10,255,217,0.2); }
  .d-step-row.pending { opacity: 0.4; }

  .d-step-icon { font-size: 16px; }
  .d-step-row.done .d-step-icon { color: var(--green); }
  .d-step-row.running .d-step-icon { color: var(--brand); }

  .d-step-text { flex: 1; }
  .d-step-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .d-step-sub { font-size: 10.5px; color: var(--text2); margin-top: 1px; }

  .d-spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(10,255,217,0.2);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .d-progress-bar-wrap { background: var(--surface3); border-radius: 3px; height: 3px; overflow: hidden; }
  .d-progress-bar-fill { height: 100%; background: var(--brand); border-radius: 3px; transition: width 0.4s ease; }

  /* ─── Metrics ─── */
  .d-metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }

  .d-metric-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 12px 14px;
  }
  .d-metric-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
  .d-metric-value { font-family: var(--font-mono); font-size: 22px; font-weight: 500; color: var(--text); line-height: 1; }
  .d-metric-unit { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .d-metric-delta { font-size: 10.5px; font-weight: 600; margin-top: 4px; }
  .delta-good { color: var(--green); }
  .delta-bad { color: var(--red); }

  /* ─── Report grid ─── */
  .d-report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ─── Skeleton view ─── */
  .d-skeleton-view {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; grid-column: 1 / -1;
  }
  .d-skeleton-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .d-skeleton-title { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; }

  .d-phase-badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px;
    background: var(--brand-dim); color: var(--brand); border: 1px solid rgba(10,255,217,0.25);
  }

  .d-skeleton-canvas-wrap {
    width: 100%; height: 280px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .d-skeleton-canvas { width: 100%; height: 100%; display: block; }

  .d-skeleton-controls {
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    border-top: 1px solid var(--border);
  }
  .d-timeline-bar {
    flex: 1; height: 4px; background: var(--surface3);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  .d-timeline-fill { height: 100%; width: 42%; background: var(--brand); border-radius: 2px; }
  .d-time-label { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }

  .d-ctrl-btn {
    background: var(--surface3); border: 1px solid var(--border); color: var(--text2);
    border-radius: 6px; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .d-ctrl-btn:hover { background: var(--surface4); color: var(--text); }

  /* ─── Errors ─── */
  .d-errors-panel {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .d-errors-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .d-error-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    transition: background 0.1s; cursor: pointer;
  }
  .d-error-item:last-child { border-bottom: none; }
  .d-error-item:hover { background: var(--surface3); }
  .d-error-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .d-error-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .d-error-dot.red { background: var(--red); box-shadow: 0 0 6px rgba(231,76,60,0.5); }
  .d-error-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(241,196,15,0.4); }
  .d-error-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(46,204,113,0.4); }
  .d-error-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .d-error-advice { font-size: 11px; color: var(--text2); margin-left: 15px; line-height: 1.5; }
  .d-error-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; margin-left: 15px; }

  .d-param-chip { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .d-param-chip.bad { background: var(--red-dim); color: var(--red); }
  .d-param-chip.warn { background: var(--yellow-dim); color: var(--yellow); }
  .d-param-chip.ok { background: var(--green-dim); color: var(--green); }
  .d-param-chip.ref { background: var(--surface3); color: var(--text3); }

  /* ─── Charts ─── */
  .d-charts-panel {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .d-charts-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 12px; }
  .d-chart-tab {
    padding: 9px 12px; font-size: 11px; font-weight: 600;
    color: var(--text3); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .d-chart-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
  .d-chart-area { padding: 14px; }

  /* ─── Phase timeline ─── */
  .d-phase-timeline { padding: 14px; }
  .d-phase-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .d-phase-name { font-size: 10.5px; color: var(--text3); width: 140px; flex-shrink: 0; text-align: right; }
  .d-phase-bar-track { flex: 1; height: 18px; background: var(--surface3); border-radius: 4px; overflow: hidden; display: flex; }
  .d-phase-seg { height: 100%; }

  /* ─── Compare ─── */
  .d-compare-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; background: var(--surface3);
    border-radius: 7px; margin-bottom: 6px;
  }
  .d-compare-name { flex: 1; font-size: 11.5px; font-weight: 600; color: var(--text2); }
  .d-compare-val { font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
  .d-compare-ref { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════════════
   MOBILE LAYOUT (≤ 768px)
   ════════════════════════════════════════════════ */
@media (max-width: 768px) {

  .desktop-only,
  .sidebar,
  .d-content { display: none !important; }

  .app { display: flex; flex-direction: column; }

  /* ─── Top bar ─── */
  .topbar {
    height: var(--top-h);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-h);
    font-size: 13px;
    font-weight: 600;
    color: var(--brand);
  }

  .logo-icon {
    width: 30px; height: 30px;
    background: var(--brand-dim);
    border: 1px solid rgba(10,255,217,0.28);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .top-actions { display: flex; gap: 6px; align-items: center; }

  .icon-btn {
    width: 36px; height: 36px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 17px; cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .icon-btn:active { background: var(--surface4); transform: scale(0.94); }

  .notif-dot {
    position: absolute;
    top: 7px; right: 7px;
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    border: 1px solid var(--surface2);
  }

  /* ─── Page scroll area ─── */
  .pages {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px calc(var(--nav-h) + 14px);
    display: none;
    animation: fadeIn 0.18s ease;
  }
  .page.active { display: block; }
  .page::-webkit-scrollbar { width: 0; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ─── Bottom nav ─── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface2);
    border-top: 1px solid var(--border);
